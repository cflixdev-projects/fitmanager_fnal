<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FitManager - Anmelden</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">
        <div class="login-logo"><i class="fa-solid fa-dumbbell"></i></div>
        <h1>Fit &amp; Aktiv</h1>
        <p class="login-sub">FitManager &middot; Kurs- &amp; Mitarbeiterplanung</p>

        <div id="login-fehler" style="display:none;">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="login-fehler-text"></span>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="benutzername" placeholder="Benutzername" autocomplete="username">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="passwort" placeholder="Passwort" autocomplete="current-password">
        </div>
        <button onclick="login()"><i class="fa-solid fa-arrow-right-to-bracket"></i> Anmelden</button>

        <div class="login-hinweis">
            <b>Testzugang Admin:</b> lisa.fit / admin123<br>
            <b>Testzugang Trainer:</b> niklas.brandt / trainer123
        </div>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
