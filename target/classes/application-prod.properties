# fuer mysql. start: java -jar fitmanager.jar --spring.profiles.active=prod
# zugangsdaten eigentlich als env vars (DB_URL, DB_USER, DB_PASSWORT)

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fitmanager}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORT:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=${PORT:8080}
